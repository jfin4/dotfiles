    ''\
    'new-window -t :6'
bind-key -n M-^ if-shell\
    'tmux join-pane -t :6.{top-left} && tmux select-layout main-vertical'\
    ''\
    'break-pane -t :6'

# window 7
bind-key -n M-7 if-shell\

    ''\
    'new-window -t :7'
bind-key -n M-& if-shell\
    'tmux join-pane -t :7.{top-left} && tmux select-layout main-vertical'\
    ''\
    'break-pane -t :7'

# window 8
bind-key -n M-8 if-shell\

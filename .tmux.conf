    ''\
    'new-window -t :5'
bind-key -n M-% if-shell\
    'tmux join-pane -t :5.{top-left} && tmux select-layout main-vertical'\
    ''\
    'break-pane -t :5'

# window 6
bind-key -n M-6 if-shell\
